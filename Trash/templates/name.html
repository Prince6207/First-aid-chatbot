<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="POST">
        <table>
            {% for item in symptoms%}
            <tr>
            <td>  <label for={{item}}>{{item }}:</label></td>
            <td>No :<input type="radio" name={{item}} value="0" checked></td>
        <td>Yes :<input type="radio" name={{item}} value="1"></td>
            </tr>
        
        {%endfor%}
        </table>
        
        <input type="submit">
    </form>
</body>
</html>
